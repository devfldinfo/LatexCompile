name: PDF Alignment Check

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Compile LaTeX Files"]
    types:
      - completed

permissions:
  contents: write

jobs:
  check-alignment:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    
    env:
      DENSITY: 300
      THRESHOLD: 0.01

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for committing

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Enable PDF support in ImageMagick
        run: |
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true

      - name: Create Alignment folder
        run: |
          mkdir -p alignment
          echo "Before cleanup:"
          ls -la alignment || true
          rm -f alignment/* || true
          echo "After cleanup:"
          ls -la alignment || true
    
      - name: Run alignment check (recursive)
        run: |
          echo "========================================"
          echo "  Checking all PDF files (recursive)"
          echo "========================================"
          echo

          find . -type f -iname "*.pdf" | while read -r FILE; do
            echo "Processing: $FILE"

            BASENAME=$(basename "$FILE" .pdf)
            # Safe name for files (replace spaces and special chars with _)
            # SAFE_NAME=$(echo "$FILE" | sed 's|[^a-zA-Z0-9]|_|g')
            SAFE_NAME="$BASENAME"

            P1="alignment/${SAFE_NAME}_p1.png"
            P2="alignment/${SAFE_NAME}_p2.png"
            P2F="alignment/${SAFE_NAME}_p2_flipped.png"
            RESULT="alignment/${SAFE_NAME}_result.txt"

            # === Convert pages ===
            convert -density $DENSITY "${FILE}[0]" "$P1"
            convert -density $DENSITY "${FILE}[1]" "$P2"

            if [[ -f "$P1" && -f "$P2" ]]; then

              # === Flip page 2 ===
              convert "$P2" -flop "$P2F"

              OVERLAY="alignment/${SAFE_NAME}_overlay.png"

            #  convert \
            #  \( "$P1" -fill red -colorize 100% \) \
            #  \( "$P2F" -fill cyan -colorize 100% \) \
            #  -compose screen \
            #  -composite \
            #  "$OVERLAY"

            else
              echo "  ERROR: Could not process pages 1 and 2"
            fi

            # === CLEANUP TEMP FILES (keep only diff images) ===
            rm -f "$P1" "$P2" "$P2F" "$RESULT"

            echo
          done

          echo "========================================"
          echo "Done"
          echo "========================================"

      - name: Commit results to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -A alignment

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update alignment diff images"
            git push
          fi
